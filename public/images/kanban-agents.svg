<svg width="340" height="56" viewBox="0 0 340 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kanban Agents">
  <!-- Hand-drawn kanban-board mark with a hard offset shadow -->
  <g>
    <!-- offset shadow block -->
    <rect x="9" y="13" width="40" height="40" fill="currentColor" opacity="0.28"/>
    <!-- board frame (thick ink stroke, square corners) -->
    <rect x="5" y="9" width="40" height="40" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    <!-- three kanban columns -->
    <line x1="18.3" y1="9" x2="18.3" y2="49" stroke="currentColor" stroke-width="2.4"/>
    <line x1="31.6" y1="9" x2="31.6" y2="49" stroke="currentColor" stroke-width="2.4"/>
    <!-- cards as little ink ticks -->
    <rect x="8.5" y="14" width="6.5" height="5" fill="currentColor"/>
    <rect x="8.5" y="22" width="6.5" height="5" fill="currentColor"/>
    <rect x="21.8" y="14" width="6.5" height="5" fill="currentColor"/>
    <rect x="21.8" y="22" width="6.5" height="5" fill="currentColor" opacity="0.45"/>
    <rect x="35.1" y="14" width="6.5" height="5" fill="currentColor" opacity="0.45"/>
  </g>
  <!-- Wordmark: KANBAN (heavy) + AGENTS (outlined), marker style -->
  <text x="62" y="26" font-family="'Caveat Brush','Architects Daughter',cursive" font-size="27" font-weight="400" letter-spacing="0.5" fill="currentColor">KANBAN</text>
  <text x="62" y="48" font-family="'Caveat Brush','Architects Daughter',cursive" font-size="22" font-weight="400" letter-spacing="3" fill="none" stroke="currentColor" stroke-width="1">AGENTS</text>
  <!-- hand-drawn underline overshooting the wordmark -->
  <path d="M60 51 C 110 47, 175 53, 220 49" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" fill="none"/>
</svg>
